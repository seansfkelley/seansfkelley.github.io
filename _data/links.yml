- title: You don't have to if you don't want to.
  url: https://www.scottsmitelli.com/articles/you-dont-have-to/
  archive: https://web.archive.org/web/20260302100548/https://www.scottsmitelli.com/articles/you-dont-have-to/
  publish_date: 2026-02-28
  excerpt: |
    If anyone out there has thought for the very first time that this might finally be the new trick that makes them feel like an old dog, or if you're a fresh graduate who spent years working through school toward an almost-certain career path that seems now to be crumbling into dust underfoot, you are the intended audience.

    Pull up a chair and endure yet another goddamn article about generative AI.

    \[...\]

    We've got enough content to infinite-scroll for the rest of our waking lives. Yet so much of it is pointless, undesirable, lacking substance, or actively harmful. It is above all joyless—like listening to a Breaking Rust album while eating a sleeve of unsalted saltines and somehow forgetting that it wasn't always this way.
- title: I Will Fucking Piledrive You If You Mention AI Again
  url: https://ludic.mataroa.blog/blog/i-will-fucking-piledrive-you-if-you-mention-ai-again/
  archive: https://web.archive.org/web/20260225210850/https://ludic.mataroa.blog/blog/i-will-fucking-piledrive-you-if-you-mention-ai-again/
  publish_date: 2024-06-19
  excerpt: |
    \[...\] At least, I thought, all that AI stuff was finally done, and we might move on to actually getting something accomplished.

    And then some absolute son of a bitch created ChatGPT, and _now look at us_. _Look at us_, resplendent in our pauper's robes, stitched from corpulent greed and breathless credulity, spending half of the planet's engineering efforts to add chatbot support to every application under the sun when half of the industry hasn't worked out how to test database backups regularly. This is why I have to visit untold violence upon the next moron to propose that AI is the future of the business - not because this is impossible _in principle_, but because they are now _indistinguishable_ from a hundred million willful fucking idiots.
- title: The Modern Curse of Overoptimization
  url: https://freddiedeboer.substack.com/p/the-modern-curse-of-overoptimization
  archive: https://web.archive.org/web/20250513070549/https://freddiedeboer.substack.com/p/the-modern-curse-of-overoptimization
  publish_date: 2024-05-03
  excerpt: |
    My current working definition of overoptimization goes like this: overoptimization has occurred when the introduction of immense amounts of information into a human system produces conditions that allow for some players within that system to maximize their comparative advantage, without overtly breaking the rules, in a way that (intentional or not) creates meaningful negative social consequences. I want to argue that many human systems in the 2020s have become overoptimized in this way, and that the social ramifications are often bad.
- title: cooler screens
  url: https://computer.rip/2023-10-22-cooler-screens.html
  archive: https://web.archive.org/web/20260227154700/https://computer.rip/2023-10-22-cooler-screens.html
  publish_date: 2023-10-22
  excerpt: |
    Still, I find myself looking at a Walgreens cooler that just two years ago was covered in clear glass, admitting direct inspection of which tall-boy teas were in stock. Today, it's an impenetrable black void. Some Walgreens employee has printed a sheet of paper, "TEA" in 96-point Cambria, and taped it to the wall above the door. Taking in this spectacle, of a multi-million dollar effort that took our coolers and made them more difficult to use, of a retail employee's haphazard effort to mitigate the hostility of their employer's merchandising, it is hard not to indulge in that escape. Surely, things can't get much worse. _Surely, these must be the latter days._
- title: The 'Enshittification' of TikTok
  url: https://www.wired.com/story/tiktok-platforms-cory-doctorow/
  archive: https://web.archive.org/web/20260228052526/https://www.wired.com/story/tiktok-platforms-cory-doctorow/
  publish_date: 2023-01-23
  excerpt: |
    Here is how platforms die: First, they are good to their users; then they abuse their users to make things better for their business customers; finally, they abuse those business customers to claw back all the value for themselves. Then, they die.

    I call this _enshittification_, and it is a seemingly inevitable consequence arising from the combination of the ease of changing how a platform allocates value, combined with the nature of a "two-sided market," where a platform sits between buyers and sellers, hold each hostage to the other, raking off an ever-larger share of the value that passes between them.
- title: Are you serious?
  url: https://visakanv.substack.com/p/are-you-serious
  archive: https://web.archive.org/web/20260215010444/https://visakanv.substack.com/p/are-you-serious
  publish_date: 2023-01-08
  excerpt: |
    Anyway so— it's actually quite rational for most people to assume that any other random person probably isn't serious. That they don't really mean what they say. Lots of people play-act seriousness for social reasons, but quit when the going gets tough. So it makes sense that lots of people are broadly cynical. Cynicism is a completely reasonable defense against fraud and bullshit. The trouble with cynicism as a defense mechanism is that you can get so good at it that you inadvertently also defend yourself against anything good happening for you.
- title: I should have loved biology
  url: https://jsomers.net/i-should-have-loved-biology/
  archive: https://web.archive.org/web/20251224182519/https://jsomers.net/i-should-have-loved-biology/
  publish_date: 2020-11-17
  excerpt: |
    In the textbooks, astonishing facts were presented without astonishment. Someone probably told me that every cell in my body has the same DNA. But no one shook me by the shoulders, saying how crazy that was.

    \[...\]

    How come we memorized chemical formulas but didn't talk about that? It was only in college, when I read Douglas Hofstadter's _Gödel, Escher, Bach_, that I came to understand cells as recursively self-modifying programs. The language alone was evocative. It suggested that the embryo—DNA making RNA, RNA making protein, protein regulating the transcription of DNA into RNA—was like a small Lisp program, with macros begetting macros begetting macros, the source code containing within it all of the instructions required for life on Earth. Could anything more interesting be imagined?
- title: Code Only Says What it Does
  url: https://brooker.co.za/blog/2020/06/23/code.html
  archive: https://web.archive.org/web/20260120210504/https://brooker.co.za/blog/2020/06/23/code.html
  publish_date: 2020-06-23
  excerpt: |
    Code says what it does. That's important for the computer, because code is the way that we ask the computer to do something. It's OK for humans, as long as we never have to modify or debug the code. As soon as we do, we have a problem. Fundamentally, debugging is an exercise in changing what a program does to match what it should do. It requires us to know what a program should do, which isn't captured in the code. Sometimes that's easy: What it does is crash, what it should do is _not crash_. Outside those trivial cases, discovering intent is harder.
- title: An app can be a home-cooked meal
  url: https://www.robinsloan.com/notes/home-cooked-app/
  archive: https://archive.is/lLPC6
  publish_date: 2020-02
  excerpt: |
    The exhortation "learn to code" has its foundations in market value. "Learn to code" is suggested as a way up, a way out. "Learn to code" offers economic leverage, professional transformation. "Learn to code" goes on your resume.

    But let's substitute a different phrase: "learn to cook". People don't only learn to cook so they can become chefs. Some do! But many more people learn to cook so they can eat better, or more affordably. Because they want to carry on a tradition. Sometimes they learn because they're bored! Or even because they enjoy spending time with the person who's teaching them.
- title: Internet 'algospeak' is changing our language in real time, from 'nip nops' to 'le dollar bean'
  url: https://www.washingtonpost.com/technology/2022/04/08/algospeak-tiktok-le-dollar-bean/
  archive: https://web.archive.org/web/20250721060602/https://www.washingtonpost.com/technology/2022/04/08/algospeak-tiktok-le-dollar-bean/
  publish_date: 2020-04-08
  excerpt: |
    When the pandemic broke out, people on TikTok and other apps began referring to it as the "Backstreet Boys reunion tour" or calling it the "panini" or "panda express" as platforms down-ranked videos mentioning the pandemic by name in an effort to combat misinformation. When young people began to discuss struggling with mental health, they talked about "becoming unalive" in order to have frank conversations about suicide without algorithmic punishment. Sex workers, who have long been censored by moderation systems, refer to themselves on TikTok as "accountants" and use the corn emoji as a substitute for the word "porn."

    \[...\]

    "One, it doesn't actually work," she said. "The people using platforms to organize real harm are pretty good at figuring out how to get around these systems. And two, it leads to collateral damage of literal speech." Attempting to regulate human speech at a scale of billions of people in dozens of different languages and trying to contend with things such as humor, sarcasm, local context and slang can't be done by simply down-ranking certain words, Greer argues.
